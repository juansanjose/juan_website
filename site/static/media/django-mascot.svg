<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" role="img" aria-labelledby="title description">
  <title id="title">Django the chameleon</title>
  <desc id="description">An orange chameleon with a curled tail</desc>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffbd16"/>
      <stop offset="0.52" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#e84b00"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff0a0"/>
      <stop offset="1" stop-color="#ff9b00"/>
    </linearGradient>
  </defs>

  <g stroke="#8f3100" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tail sits behind the body. -->
    <path fill="none" stroke="url(#body)" stroke-width="15" d="M218 71c31-2 55 4 72 21 17 18 10 39-8 38-20-1-25-25-9-35 14-8 29 5 21 18-5 9-17 7-19-2"/>
    <path fill="none" stroke="#ffd04b" stroke-width="3" d="M224 67c29 0 50 6 65 21" opacity=".85"/>

    <!-- Body and head form a clean silhouette at small sizes. -->
    <path fill="url(#body)" d="M77 54c26-32 66-43 108-34 34 7 58 25 70 48-18 13-39 19-66 18-38-2-58-15-84-16-14 0-24 6-35 14z"/>
    <path fill="url(#body)" d="M4 79 43 28C53 15 66 6 83 3l3 71-19 17H11z"/>

    <!-- Legs. -->
    <path fill="url(#body)" d="M116 70c9 4 18 9 25 16l-11 17-16 24-14 1 14-10 10-28-24-9z"/>
    <path fill="url(#body)" d="M198 79c10-4 23-4 34 2l-17 10 4 25 12 7-15 1-13-29-18-6z"/>
    <path fill="none" d="m99 127-12 6m14-5-5 7m134-12 9 5m-9-5 12-1"/>

    <!-- Face. -->
    <path fill="url(#light)" d="M5 78 42 42c11-11 29-9 38 3 8 11 5 28-7 36L61 89H12z"/>
    <circle cx="51" cy="62" r="18" fill="#ff9b00"/>
    <circle cx="51" cy="62" r="10" fill="#ffd43b"/>
    <circle cx="51" cy="62" r="4.5" fill="#4e1b00" stroke="none"/>
    <path fill="none" d="M8 78h20m-14 9h43"/>

    <!-- Broad markings retain character without raster speckling. -->
    <path fill="none" stroke="#ffd64b" stroke-width="5" d="M91 55c35-24 81-30 119-12m-101 19c35-14 76-14 111 1" opacity=".9"/>
    <path fill="none" stroke="#c94500" stroke-width="4" d="M151 27v49m23-51v55m-47-48 4 42m66-41-2 46" opacity=".65"/>
    <path fill="#ffe275" stroke="none" d="M98 47h8v6h-8zm24-11h9v6h-9zm24-6h9v6h-9zm25 1h9v6h-9zm25 7h9v6h-9zm-81 25h9v6h-9zm26-6h9v6h-9zm28 0h9v6h-9zm29 5h9v6h-9z"/>
    <path fill="none" d="M275 110c-1-9 12-13 18-6 8 9-1 22-12 20-13-2-18-17-10-27"/>
  </g>
</svg>
