<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 320 140"
     role="img"
     aria-labelledby="title description"
     shape-rendering="crispEdges">
  <title id="title">Django the chameleon</title>
  <desc id="description">The original orange pixel-art chameleon with a curled tail</desc>
  <image href="django-mascot.png"
         xlink:href="django-mascot.png"
         width="320"
         height="140"
         image-rendering="pixelated"
         preserveAspectRatio="xMidYMid meet"/>
</svg>
