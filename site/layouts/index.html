{{ define "main" }}

  {{ .Content }}

  {{ $posts := where site.RegularPages "Section" "blog" }}
  {{ if $posts }}
    <h2>Posts</h2>
    <ul class="post-list">
      {{ range sort $posts "Date" "desc" }}
      <li>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
      {{ end }}
    </ul>
  {{ else }}
    <p>No posts yet.</p>
  {{ end }}

{{ end }}
