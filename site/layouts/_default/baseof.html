<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.Params.description }}">
  <title>{{ if .IsHome }}{{ site.Params.author }}{{ else }}{{ .Title }} — {{ site.Params.author }}{{ end }}</title>

  {{ $style := resources.Get "css/retro.css" | minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">

  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml" href="{{ .RelPermalink }}" title="{{ site.Params.author }}">
  {{ end }}

  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="site-title"><a href="{{ site.BaseURL }}">{{ site.Params.author }}</a></div>
      <nav class="site-nav">
        <a href="{{ site.BaseURL }}">home</a>
        <a href="{{ site.BaseURL }}blog/">blog</a>
        <a href="{{ site.BaseURL }}about/">about</a>
        <button class="theme-toggle" type="button" aria-label="Switch to blue theme">blue</button>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ now.Format "2006" }} {{ site.Params.author }}</p>
    </div>
  </footer>

  <script>
    var themeToggle = document.querySelector('.theme-toggle');

    function updateThemeToggle() {
      var blueTheme = document.documentElement.getAttribute('data-theme') === 'dark';
      themeToggle.textContent = blueTheme ? 'white' : 'blue';
      themeToggle.setAttribute('aria-label', blueTheme ? 'Switch to white theme' : 'Switch to blue theme');
    }

    updateThemeToggle();

    themeToggle.addEventListener('click', function() {
      var root = document.documentElement;
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeToggle();
    });
  </script>
</body>
</html>
