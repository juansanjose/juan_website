<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.Params.description }}">
  <title>{{ if .IsHome }}{{ site.Params.author }}{{ else }}{{ .Title }}{{ end }}</title>

  {{ $style := resources.Get "css/retro.css" | minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  <link rel="prefetch" href="{{ site.BaseURL }}media/blue-alien-cropped.webp" as="image" type="image/webp">

  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml" href="{{ .RelPermalink }}" title="{{ site.Params.author }}">
  {{ end }}

  <script src="{{ site.BaseURL }}js/theme.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="site-brand">
        <button class="palette-toggle" type="button" title="Choose the site color palette" aria-label="Choose the site color palette">
          <img class="site-mascot" src="{{ site.BaseURL }}media/green-block-mascot.svg" alt="Green pixel mascot" width="48" height="48">
        </button>
        <div class="palette-menu" hidden aria-label="Choose a site palette">
          <button class="palette-swatch" type="button" data-palette="white" style="--swatch: #eeeeee" aria-label="Light gray palette"></button>
          <button class="palette-swatch" type="button" data-palette="red" style="--swatch: #c62828" aria-label="Red palette"></button>
          <button class="palette-swatch" type="button" data-palette="orange" style="--swatch: #ef6c00" aria-label="Orange palette"></button>
          <button class="palette-swatch" type="button" data-palette="yellow" style="--swatch: #f7d038" aria-label="Yellow palette"></button>
          <button class="palette-swatch" type="button" data-palette="green" style="--swatch: #16823b" aria-label="Green palette"></button>
          <button class="palette-swatch" type="button" data-palette="blue" style="--swatch: #003cff" aria-label="Blue palette"></button>
          <button class="palette-swatch" type="button" data-palette="purple" style="--swatch: #6b35a8" aria-label="Purple palette"></button>
          <button class="palette-swatch" type="button" data-palette="black" style="--swatch: #111111" aria-label="Black palette"></button>
        </div>
      </div>
      <nav class="site-nav">
        <a href="{{ site.BaseURL }}">home</a>
        <a href="{{ site.BaseURL }}blog/">blog</a>
        <a href="{{ site.BaseURL }}about/">about</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ now.Format "2006" }}</p>
    </div>
  </footer>

  <button class="sound-toggle" type="button" title="Alert: click to play the full Blue song" aria-label="Alert: click to play the full Blue song">⚠ SOUND</button>
  <video class="blue-roach" hidden muted loop playsinline preload="metadata" aria-hidden="true">
    <source src="{{ site.BaseURL }}media/dancing-rainbow-roach.mp4" type="video/mp4">
  </video>
  <audio class="blue-song" preload="none">
    <source src="{{ site.BaseURL }}media/blue-8-bit.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
