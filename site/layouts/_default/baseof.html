<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.Params.description }}">
  <title>{{ if .IsHome }}{{ site.Params.author }}{{ else }}{{ .Title }} — {{ site.Params.author }}{{ end }}</title>

  {{ $style := resources.Get "css/retro.css" | minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">

  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml" href="{{ .RelPermalink }}" title="{{ site.Params.author }}">
  {{ end }}

  <script src="{{ site.BaseURL }}js/theme.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="site-brand">
        <button class="palette-toggle" type="button" title="Choose the site color palette" aria-label="Choose the site color palette">
          <img class="site-mascot" src="{{ site.BaseURL }}media/django-mascot.png" alt="Django, an orange cowboy lizard" width="72" height="48">
        </button>
        <a class="site-identity" href="{{ site.BaseURL }}">
          <span class="site-title">{{ site.Params.author }}</span>
        </a>
        <input class="palette-picker" type="color" value="#ffffff" aria-label="Site color palette">
      </div>
      <nav class="site-nav">
        <a href="{{ site.BaseURL }}">home</a>
        <a href="{{ site.BaseURL }}blog/">blog</a>
        <a href="{{ site.BaseURL }}about/">about</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ now.Format "2006" }} {{ site.Params.author }}</p>
    </div>
  </footer>

  <button class="sound-toggle" type="button" title="Alert: click to play the full Blue song" aria-label="Alert: click to play the full Blue song">⚠ SOUND</button>
  <video class="blue-roach" hidden muted loop playsinline preload="metadata" aria-hidden="true">
    <source src="{{ site.BaseURL }}media/dancing-rainbow-roach.mp4" type="video/mp4">
  </video>
  <audio class="blue-song" preload="none">
    <source src="{{ site.BaseURL }}media/blue-8-bit.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
