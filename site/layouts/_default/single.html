{{ define "main" }}

  <article>
    <header>
      <h1>{{ .Title }}</h1>
      {{ if .Date }}
        <p class="post-meta">{{ .Date.Format "Jan 2, 2006" }}</p>
      {{ end }}
    </header>

    {{ .Content }}
  </article>

  {{ if eq .Section "blog" }}
    {{ partial "comments.html" . }}
  {{ end }}

  <a class="back-link" href="{{ site.BaseURL }}blog/">← all posts</a>

{{ end }}
